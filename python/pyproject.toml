[tool.ruff]
extend-exclude = ["__pycache__"]
target-version = "py314"
line-length = 120                # 行の最大長
indent-width = 4

[tool.ruff.format]
docstring-code-format = true      # docstringのコードブロックをフォーマットする
docstring-code-line-length = 120  # docstringの最大長
indent-style = "space"
line-ending = "lf"                # 行末はLFにする
quote-style = "double"
skip-magic-trailing-comma = false

[tool.ruff.lint]
select = ["N", "E", "W", "D", "F", "I", "C90", "S", "TID", "ARG"]
ignore = [
  "D400",   # docstringの末尾にピリオドを要求しない
  "D415",   # docstringの末尾にピリオドを要求しない
  "TID252", # 相対インポートを許容
]
fixable = ["ALL"] # 修正可能なコードは全て修正
unfixable = [] # 修正を無視するエラーコードリスト
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$" # _,__から始まる変数名を許容

[tool.ruff.lint.per-file-ignores]
"**/__init__.py" = [
  "D104", # __init__.pyはドキュメントが不要
]

[tool.ruff.lint.flake8-bandit]
check-typed-exception = true # try-except-passを禁止

[tool.ruff.lint.pycodestyle]
max-doc-length = 120 # docstringの最大長

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.mccabe]
max-complexity = 15 # 循環的複雑度

[tool.ruff.lint.isort]
case-sensitive = true # インポート順は大文字小文字を区別

[tool.mypy]
show_error_context = true
show_column_numbers = true
ignore_missing_imports = true
disallow_untyped_defs = true
no_implicit_optional = true
warn_return_any = true
check_untyped_defs = true
explicit_package_bases = true
